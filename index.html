<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Graph Generator Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .roboto {
        font-family: "Roboto", sans-serif;
      }
      .fade-enter-active,
      .fade-leave-active {
        transition: opacity 0.3s;
      }
      .fade-enter-from,
      .fade-leave-to {
        opacity: 0;
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="app" class="p-6 max-w-7xl mx-auto">
      <header class="mb-8 border-b pb-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-slate-800">Graph Generator</h1>
      </header>

      <div class="grid grid-cols-12 gap-8">
        <aside class="col-span-4 space-y-6">
          <section
            class="bg-white p-4 rounded-lg shadow-sm border-2 border-blue-500 space-y-3"
          >
            <h2 class="font-bold text-blue-700">
              1. Choisir le type de graphique
            </h2>
            <div class="grid grid-cols-2 gap-2">
              <button
                v-for="t in types"
                :key="t.id"
                @click="config.type = t.id"
                :class="['p-2 rounded border text-xs font-bold transition-all', config.type === t.id ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300']"
              >
                {{ t.label }}
              </button>
            </div>
          </section>

          <section
            class="bg-white p-4 rounded-lg shadow-sm border border-slate-200"
          >
            <h2 class="font-semibold mb-3">2. Importer les données</h2>
            <div
              class="bg-blue-50 p-2 rounded mb-3 text-[10px] text-blue-800 leading-tight"
            >
              <strong>Format attendu :</strong> {{ currentTypeHint }}
            </div>
            <textarea
              v-model="rawInput"
              :placeholder="currentPlaceholder"
              class="w-full h-48 border p-2 text-xs font-mono rounded bg-slate-50 focus:bg-white transition-all outline-none"
            ></textarea>

            <div
              v-if="headers.length && config.type !== 'pie'"
              class="mt-4 space-y-3"
            >
              <label class="block text-sm font-medium italic text-slate-600"
                >Séries à afficher :</label
              >
              <div class="flex flex-wrap gap-2">
                <label
                  v-for="h in headers.filter(h => h !== mapping.x)"
                  :key="h"
                  class="flex items-center space-x-2 bg-slate-100 p-2 rounded cursor-pointer hover:bg-slate-200"
                >
                  <input
                    type="checkbox"
                    :value="h"
                    v-model="mapping.yKeys"
                    class="rounded text-blue-600"
                  />
                  <span class="text-xs font-bold">{{h}}</span>
                </label>
              </div>
            </div>
          </section>

          <section
            class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 space-y-4"
          >
            <h2 class="font-semibold">3. Titre et Options</h2>
            <input
              v-model="config.title"
              placeholder="Titre du graphique"
              class="w-full border p-2 rounded text-sm"
            />
            <input
              v-model="config.source"
              placeholder="Source (ex: INSEE)"
              class="w-full border p-2 rounded text-sm"
            />

            <div
              v-if="config.type === 'pie'"
              class="flex items-center gap-2 mt-2 bg-slate-50 p-2 rounded border border-dashed border-slate-300"
            >
              <input
                type="checkbox"
                id="showLegend"
                v-model="config.showPieLegend"
                class="w-4 h-4 rounded text-blue-600"
              />
              <label
                for="showLegend"
                class="text-xs font-bold text-slate-600 cursor-pointer text-blue-700"
                >Afficher la légende</label
              >
            </div>
          </section>

          <section
            class="bg-white p-4 rounded-lg shadow-sm border border-slate-200"
          >
            <h2 class="font-semibold mb-3 italic text-slate-500 text-sm">
              Projet
            </h2>
            <div class="grid grid-cols-2 gap-2">
              <button
                @click="newProject"
                class="col-span-2 bg-slate-100 py-2 rounded text-xs font-bold hover:bg-slate-200 border border-slate-200 transition-colors italic"
              >
                Nettoyer tout
              </button>
              <button
                @click="triggerOpenFile"
                class="bg-blue-50 text-blue-700 py-2 rounded text-xs font-bold border border-blue-200 hover:bg-blue-100 transition-colors"
              >
                📂 Ouvrir
              </button>
              <button
                @click="saveProject"
                class="bg-green-50 text-green-700 py-2 rounded text-xs font-bold border border-green-200 hover:bg-green-100 transition-colors"
              >
                💾 Enregistrer
              </button>
            </div>
            <input
              type="file"
              ref="fileInput"
              @change="openProject"
              style="display: none"
              accept=".json"
            />
          </section>
        </aside>

        <main class="col-span-8">
          <div
            class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden"
            id="capture-zone"
          >
            <div id="chart-container" class="w-full leading-[0]"></div>
            <div
              class="p-4 border-t border-slate-50 bg-slate-50/50"
              v-if="config.source"
            >
              <p class="text-xs italic text-slate-400 roboto">
                Source : {{config.source}}
              </p>
            </div>
          </div>
        </main>
      </div>

      <transition name="fade">
        <div
          v-if="isTextSelected"
          class="fixed bottom-10 right-10 bg-black/90 text-white p-4 rounded-xl shadow-2xl backdrop-blur-sm flex flex-col gap-3 z-50"
        >
          <div
            class="flex items-center gap-2 border-b border-slate-700 pb-2 mb-1"
          >
            <input
              type="checkbox"
              id="applyAll"
              v-model="applyToSerie"
              class="w-4 h-4 accent-blue-500"
            />
            <label
              for="applyAll"
              class="text-[10px] font-bold uppercase text-blue-400 cursor-pointer"
              >Appliquer à toute la série</label
            >
            <button
              @click="actions.undo()"
              :disabled="history.length <= 1"
              class="ml-auto text-[10px] bg-orange-600/20 text-orange-400 px-2 py-0.5 rounded border border-orange-500/30 hover:bg-orange-600/40 disabled:opacity-30"
            >
              ↩ Annuler
            </button>
          </div>
          <div class="flex items-center gap-3">
            <select
              @change="actions.setSize($event.target.value, applyToSerie)"
              class="bg-slate-700 text-white text-xs rounded px-1 py-1 outline-none border border-slate-600"
            >
              <option
                v-for="size in [8, 10, 12, 14, 16, 20, 24, 32]"
                :value="size"
              >
                {{size}}px
              </option>
            </select>
            <button
              @click="actions.bold(applyToSerie)"
              class="px-3 py-1 bg-slate-700 rounded font-bold text-xs border border-slate-600"
            >
              G
            </button>
            <button
              @click="actions.italic(applyToSerie)"
              class="px-3 py-1 bg-slate-700 rounded italic text-xs border border-slate-600"
            >
              I
            </button>
            <div class="flex items-center gap-1">
              <input
                type="color"
                @input="actions.setBg($event.target.value, applyToSerie)"
                class="w-6 h-6 bg-transparent cursor-pointer border-none"
              />
              <button
                @click="actions.outline(applyToSerie)"
                class="px-2 py-1 bg-slate-700 rounded border border-slate-500 text-lg leading-none"
              >
                ▢
              </button>
            </div>
            <button
              @click="actions.delete()"
              class="p-2 bg-red-600 rounded hover:bg-red-700 transition-colors"
            >
              ✕
            </button>
          </div>
        </div>
      </transition>
    </div>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
